{{define "spin_result.html"}}
{{$s := .Session}}
{{$spin := .Spin}}
<div>
  <div class="mb-4">
    <span class="text-xs text-neutral-500 uppercase tracking-wider">{{$spin.Era.Name}}</span>
    <h3 class="text-xl font-black">{{$spin.Constructor}}
      <span class="text-neutral-400 font-normal text-base">'{{mod $spin.Season 100 | printf "%02d"}}</span>
    </h3>
  </div>

  <div class="grid grid-cols-2 gap-4 mb-6">
    <!-- Driver A -->
    <button
      hx-post="/game/{{$s.ID}}/pick/a"
      hx-target="#spin-area"
      hx-swap="innerHTML"
      class="bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 hover:border-red-500 rounded-xl p-5 text-left transition-all group">
      <div class="text-lg font-bold group-hover:text-red-400 transition-colors">{{$spin.DriverA.Name}}</div>
      <div class="text-sm text-neutral-400 mt-1">{{$spin.DriverA.Season}} · {{$spin.DriverA.Constructor}}</div>
      <div class="mt-3 grid grid-cols-3 gap-2 text-center">
        <div class="bg-neutral-900 rounded p-2">
          <div class="text-lg font-black">{{$spin.DriverA.Wins}}</div>
          <div class="text-xs text-neutral-500">Wins</div>
        </div>
        <div class="bg-neutral-900 rounded p-2">
          <div class="text-lg font-black">{{$spin.DriverA.Poles}}</div>
          <div class="text-xs text-neutral-500">Poles</div>
        </div>
        <div class="bg-neutral-900 rounded p-2">
          <div class="text-lg font-black">{{printf "%.0f" $spin.DriverA.Points}}</div>
          <div class="text-xs text-neutral-500">Points</div>
        </div>
      </div>
      <div class="mt-2 text-xs text-neutral-500">
        Pace Score: <span class="text-white font-semibold">{{printf "%.1f" $spin.DriverA.PaceScore}}</span>
      </div>
    </button>

    <!-- Driver B -->
    <button
      hx-post="/game/{{$s.ID}}/pick/b"
      hx-target="#spin-area"
      hx-swap="innerHTML"
      class="bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 hover:border-red-500 rounded-xl p-5 text-left transition-all group">
      <div class="text-lg font-bold group-hover:text-red-400 transition-colors">{{$spin.DriverB.Name}}</div>
      <div class="text-sm text-neutral-400 mt-1">{{$spin.DriverB.Season}} · {{$spin.DriverB.Constructor}}</div>
      <div class="mt-3 grid grid-cols-3 gap-2 text-center">
        <div class="bg-neutral-900 rounded p-2">
          <div class="text-lg font-black">{{$spin.DriverB.Wins}}</div>
          <div class="text-xs text-neutral-500">Wins</div>
        </div>
        <div class="bg-neutral-900 rounded p-2">
          <div class="text-lg font-black">{{$spin.DriverB.Poles}}</div>
          <div class="text-xs text-neutral-500">Poles</div>
        </div>
        <div class="bg-neutral-900 rounded p-2">
          <div class="text-lg font-black">{{printf "%.0f" $spin.DriverB.Points}}</div>
          <div class="text-xs text-neutral-500">Points</div>
        </div>
      </div>
      <div class="mt-2 text-xs text-neutral-500">
        Pace Score: <span class="text-white font-semibold">{{printf "%.1f" $spin.DriverB.PaceScore}}</span>
      </div>
    </button>
  </div>

  <!-- Skip buttons -->
  <div class="flex gap-3 justify-center text-sm">
    {{if gt $s.ConstructorSkipsLeft 0}}
    <button
      hx-post="/game/{{$s.ID}}/skip/constructor"
      hx-target="#spin-area"
      hx-swap="innerHTML"
      class="bg-neutral-800 hover:bg-neutral-700 text-neutral-300 px-4 py-2 rounded-lg transition-colors">
      🔄 Different constructor ({{$s.ConstructorSkipsLeft}} left)
    </button>
    {{end}}
    {{if gt $s.EraSkipsLeft 0}}
    <button
      hx-post="/game/{{$s.ID}}/skip/era"
      hx-target="#spin-area"
      hx-swap="innerHTML"
      class="bg-neutral-800 hover:bg-neutral-700 text-neutral-300 px-4 py-2 rounded-lg transition-colors">
      ⏭️ Different era ({{$s.EraSkipsLeft}} left)
    </button>
    {{end}}
  </div>
</div>
{{end}}
