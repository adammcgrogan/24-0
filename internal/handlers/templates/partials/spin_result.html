{{define "spin_result.html"}}
{{$s := .Session}}
{{$spin := .Spin}}

<!-- ── Constructor header ──────────────────────────── -->
<div class="anim-slot" style="margin-bottom:1.4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.6rem;
     padding:1.1rem 1.4rem; background:var(--surf-2); border:1px solid var(--border-2); border-radius:2px; position:relative; overflow:hidden;">
  <div style="position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--red) 0%, rgba(225,6,0,.3) 60%, transparent 100%);"></div>
  <div style="position:absolute; top:0; bottom:0; left:0; width:3px; background:var(--red);"></div>
  <div style="padding-left:.3rem;">
    <p class="section-label" style="margin-bottom:.3rem;">Constructor Drawn</p>
    <h3 class="f-display" style="font-weight:900; font-size:1.6rem; letter-spacing:.01em; line-height:1; color:var(--text);">
      {{$spin.Constructor}}&thinsp;<span style="color:var(--text-3); font-size:1rem; font-weight:600; letter-spacing:.04em;">&apos;{{mod $spin.Season 100 | printf "%02d"}}</span>
    </h3>
  </div>
  <div style="text-align:right;">
    <p style="font-size:.75rem; color:var(--text-3); margin-bottom:.2rem;">Pick one driver</p>
    <p class="f-mono" style="font-size:.6rem; color:var(--red); letter-spacing:.1em;">SELECT BELOW</p>
  </div>
</div>

<!-- ── Driver cards: A — VS — B ───────────────────── -->
<div style="display:grid; grid-template-columns:1fr 52px 1fr; align-items:stretch; margin-bottom:1.2rem;">

  <!-- Driver A -->
  <button
    hx-post="/game/{{$s.ID}}/pick/a"
    hx-target="#spin-area"
    hx-swap="innerHTML"
    class="pick-card anim-slide-left"
    style="padding:1.5rem; text-align:left; display:flex; flex-direction:column; width:100%; height:100%; border-right:none; border-radius:2px 0 0 2px;">

    <div style="display:flex; align-items:flex-start; gap:.7rem; margin-bottom:1rem;">
      <div class="option-badge">A</div>
      <div style="flex:1; min-width:0;">
        <div class="f-display" style="font-weight:900; font-size:1.35rem; color:var(--text); line-height:1.05; letter-spacing:.01em;">{{$spin.DriverA.Name}}</div>
        <div style="font-size:.72rem; color:var(--text-3); margin-top:.25rem;">{{$spin.DriverA.Season}} · {{$spin.DriverA.Constructor}}</div>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:.35rem; margin-bottom:.9rem;">
      <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.65rem .3rem; text-align:center;">
        <div class="f-mono" style="font-size:1.25rem; font-weight:700; color:var(--text); line-height:1;">{{$spin.DriverA.Wins}}</div>
        <div style="font-size:.56rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.08em; text-transform:uppercase;">Wins</div>
      </div>
      <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.65rem .3rem; text-align:center;">
        <div class="f-mono" style="font-size:1.25rem; font-weight:700; color:var(--text); line-height:1;">{{$spin.DriverA.Poles}}</div>
        <div style="font-size:.56rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.08em; text-transform:uppercase;">Poles</div>
      </div>
      <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.65rem .3rem; text-align:center;">
        <div class="f-mono" style="font-size:1.25rem; font-weight:700; color:var(--text); line-height:1;">{{printf "%.0f" $spin.DriverA.Points}}</div>
        <div style="font-size:.56rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.08em; text-transform:uppercase;">Pts</div>
      </div>
    </div>

    <div style="margin-bottom:auto;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:.35rem;">
        <span class="section-label">Pace Rating</span>
        <span class="f-mono" style="font-size:.75rem; color:var(--text); font-weight:700;">{{printf "%.0f" $spin.DriverA.PaceScore}}<span style="color:var(--text-3); font-size:.6rem;">/100</span></span>
      </div>
      <div style="height:5px; background:var(--surf); border:1px solid var(--border); border-radius:1px; overflow:hidden;">
        <div style="height:100%; width:{{printf "%.0f" $spin.DriverA.PaceScore}}%; background:linear-gradient(90deg, var(--red) 0%, #ff4422 100%); border-radius:1px;"></div>
      </div>
    </div>

    <div class="card-footer" style="margin-left:-1.5rem; margin-right:-1.5rem; margin-bottom:-1.5rem;">
      Pick A &nbsp;→
    </div>
  </button>

  <!-- VS col -->
  <div class="vs-col">
    <div class="vs-pill">VS</div>
  </div>

  <!-- Driver B -->
  <button
    hx-post="/game/{{$s.ID}}/pick/b"
    hx-target="#spin-area"
    hx-swap="innerHTML"
    class="pick-card anim-slide-right"
    style="padding:1.5rem; text-align:left; display:flex; flex-direction:column; width:100%; height:100%; border-left:none; border-radius:0 2px 2px 0;">

    <div style="display:flex; align-items:flex-start; gap:.7rem; margin-bottom:1rem;">
      <div class="option-badge">B</div>
      <div style="flex:1; min-width:0;">
        <div class="f-display" style="font-weight:900; font-size:1.35rem; color:var(--text); line-height:1.05; letter-spacing:.01em;">{{$spin.DriverB.Name}}</div>
        <div style="font-size:.72rem; color:var(--text-3); margin-top:.25rem;">{{$spin.DriverB.Season}} · {{$spin.DriverB.Constructor}}</div>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:.35rem; margin-bottom:.9rem;">
      <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.65rem .3rem; text-align:center;">
        <div class="f-mono" style="font-size:1.25rem; font-weight:700; color:var(--text); line-height:1;">{{$spin.DriverB.Wins}}</div>
        <div style="font-size:.56rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.08em; text-transform:uppercase;">Wins</div>
      </div>
      <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.65rem .3rem; text-align:center;">
        <div class="f-mono" style="font-size:1.25rem; font-weight:700; color:var(--text); line-height:1;">{{$spin.DriverB.Poles}}</div>
        <div style="font-size:.56rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.08em; text-transform:uppercase;">Poles</div>
      </div>
      <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.65rem .3rem; text-align:center;">
        <div class="f-mono" style="font-size:1.25rem; font-weight:700; color:var(--text); line-height:1;">{{printf "%.0f" $spin.DriverB.Points}}</div>
        <div style="font-size:.56rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.08em; text-transform:uppercase;">Pts</div>
      </div>
    </div>

    <div style="margin-bottom:auto;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:.35rem;">
        <span class="section-label">Pace Rating</span>
        <span class="f-mono" style="font-size:.75rem; color:var(--text); font-weight:700;">{{printf "%.0f" $spin.DriverB.PaceScore}}<span style="color:var(--text-3); font-size:.6rem;">/100</span></span>
      </div>
      <div style="height:5px; background:var(--surf); border:1px solid var(--border); border-radius:1px; overflow:hidden;">
        <div style="height:100%; width:{{printf "%.0f" $spin.DriverB.PaceScore}}%; background:linear-gradient(90deg, var(--red) 0%, #ff4422 100%); border-radius:1px;"></div>
      </div>
    </div>

    <div class="card-footer" style="margin-left:-1.5rem; margin-right:-1.5rem; margin-bottom:-1.5rem;">
      Pick B &nbsp;→
    </div>
  </button>

</div>

<!-- ── Reroll ───────────────────────────────────────── -->
{{if gt $s.ConstructorSkipsLeft 0}}
<div style="display:flex; justify-content:center; padding-top:.4rem;">
  <button
    hx-post="/game/{{$s.ID}}/skip/constructor"
    hx-target="#spin-area"
    hx-swap="innerHTML"
    class="btn-secondary">
    🔄 &nbsp;Different team &nbsp;<span style="color:var(--text-3); font-size:.8em;">({{$s.ConstructorSkipsLeft}} left)</span>
  </button>
</div>
{{end}}
{{end}}
