{{define "component_spin.html"}}
{{$s := .Session}}
{{$spin := .Spin}}
<div>
  <!-- Context header -->
  <div class="mb-5 text-center">
    <span class="text-xs text-neutral-500 uppercase tracking-widest">{{$spin.Era.Name}} · </span>
    <span class="text-xs bg-blue-900 text-blue-300 rounded px-2 py-0.5 font-bold">{{categoryName $spin.Category}}</span>
    <p class="text-xs text-neutral-500 mt-2">Choose the best option for your team</p>
  </div>

  <div class="grid grid-cols-2 gap-4 mb-6">
    <!-- Option A -->
    <button
      hx-post="/game/{{$s.ID}}/pick/component/a"
      hx-target="#spin-area"
      hx-swap="innerHTML"
      class="bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 hover:border-blue-500 rounded-xl p-5 text-left transition-all group">
      <div class="text-sm font-bold group-hover:text-blue-400 transition-colors leading-tight">{{$spin.OptionA.Name}}</div>
      <div class="mt-3 bg-neutral-900 rounded p-2 text-center">
        <div class="text-2xl font-black">{{printf "%.0f" $spin.OptionA.Score}}</div>
        <div class="text-xs text-neutral-500">Score / 100</div>
      </div>
      {{if $spin.OptionA.Specialty}}
      <div class="mt-2 text-xs text-neutral-500">
        Best at: <span class="text-neutral-300 font-medium">{{$spin.OptionA.Specialty}}</span>
      </div>
      {{end}}
      <p class="mt-2 text-xs text-neutral-500 leading-relaxed">{{$spin.OptionA.Description}}</p>
    </button>

    <!-- Option B -->
    <button
      hx-post="/game/{{$s.ID}}/pick/component/b"
      hx-target="#spin-area"
      hx-swap="innerHTML"
      class="bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 hover:border-blue-500 rounded-xl p-5 text-left transition-all group">
      <div class="text-sm font-bold group-hover:text-blue-400 transition-colors leading-tight">{{$spin.OptionB.Name}}</div>
      <div class="mt-3 bg-neutral-900 rounded p-2 text-center">
        <div class="text-2xl font-black">{{printf "%.0f" $spin.OptionB.Score}}</div>
        <div class="text-xs text-neutral-500">Score / 100</div>
      </div>
      {{if $spin.OptionB.Specialty}}
      <div class="mt-2 text-xs text-neutral-500">
        Best at: <span class="text-neutral-300 font-medium">{{$spin.OptionB.Specialty}}</span>
      </div>
      {{end}}
      <p class="mt-2 text-xs text-neutral-500 leading-relaxed">{{$spin.OptionB.Description}}</p>
    </button>
  </div>
</div>
{{end}}
