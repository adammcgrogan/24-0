{{define "component_spin.html"}}
{{$s := .Session}}
{{$spin := .Spin}}

<!-- ── Category header ────────────────────────────── -->
<div class="anim-slot" style="margin-bottom:1.4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.6rem;
     padding:1.1rem 1.4rem; background:var(--surf-2); border:1px solid var(--border-2); border-radius:2px; position:relative; overflow:hidden;">
  <div style="position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--blue) 30%, transparent 100%);"></div>
  <div style="display:flex; align-items:center; gap:.75rem;">
    <span style="font-size:.78rem; color:var(--text-3);">{{$spin.Era.Name}}</span>
    <span style="width:1px; height:14px; background:var(--border-2); display:inline-block;"></span>
    <span class="f-display" style="font-weight:800; font-size:.82rem; text-transform:uppercase; letter-spacing:.1em;
          background:rgba(59,130,246,.18); color:var(--blue); border-radius:2px; padding:.2rem .6rem;">
      {{categoryName $spin.Category}}
    </span>
  </div>
  <p style="font-size:.78rem; color:var(--text-3);">Choose the best option for your team</p>
</div>

<!-- ── Option cards: A — VS — B ──────────────────── -->
<div style="display:grid; grid-template-columns:1fr 52px 1fr; align-items:stretch; margin-bottom:1rem;">

  <!-- Option A -->
  <button
    hx-post="/game/{{$s.ID}}/pick/component/a"
    hx-target="#spin-area"
    hx-swap="innerHTML"
    class="comp-card anim-slide-left"
    style="padding:1.5rem; text-align:left; display:flex; flex-direction:column; width:100%; height:100%; border-right:none; border-radius:2px 0 0 2px; background:none; border:1px solid var(--border-2);">

    <!-- Name row -->
    <div style="display:flex; align-items:flex-start; gap:.7rem; margin-bottom:1rem;">
      <div class="option-badge">A</div>
      <div class="f-display" style="font-weight:800; font-size:1.05rem; color:var(--text); line-height:1.2; letter-spacing:.01em; flex:1; min-width:0;">{{$spin.OptionA.Name}}</div>
    </div>

    <!-- Score hero -->
    <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.9rem; text-align:center; margin-bottom:.9rem;">
      <div class="f-mono" style="font-size:2rem; font-weight:700; color:var(--text); line-height:1;">{{printf "%.0f" $spin.OptionA.Score}}</div>
      <div style="font-size:.6rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.1em; text-transform:uppercase;">Score / 100</div>
    </div>

    {{if $spin.OptionA.Specialty}}
    <div style="font-size:.76rem; color:var(--text-3); margin-bottom:.55rem;">
      Best at: <span style="color:var(--text-2); font-weight:600;">{{$spin.OptionA.Specialty}}</span>
    </div>
    {{end}}

    <p style="font-size:.8rem; color:var(--text-3); line-height:1.6; margin-bottom:auto;">{{$spin.OptionA.Description}}</p>

    <!-- Pick footer -->
    <div class="card-footer" style="margin-left:-1.5rem; margin-right:-1.5rem; margin-bottom:-1.5rem;">
      Pick A &nbsp;→
    </div>
  </button>

  <!-- VS col -->
  <div class="vs-col">
    <div class="vs-pill">VS</div>
  </div>

  <!-- Option B -->
  <button
    hx-post="/game/{{$s.ID}}/pick/component/b"
    hx-target="#spin-area"
    hx-swap="innerHTML"
    class="comp-card anim-slide-right"
    style="padding:1.5rem; text-align:left; display:flex; flex-direction:column; width:100%; height:100%; border-left:none; border-radius:0 2px 2px 0; background:none; border:1px solid var(--border-2);">

    <!-- Name row -->
    <div style="display:flex; align-items:flex-start; gap:.7rem; margin-bottom:1rem;">
      <div class="option-badge">B</div>
      <div class="f-display" style="font-weight:800; font-size:1.05rem; color:var(--text); line-height:1.2; letter-spacing:.01em; flex:1; min-width:0;">{{$spin.OptionB.Name}}</div>
    </div>

    <!-- Score hero -->
    <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.9rem; text-align:center; margin-bottom:.9rem;">
      <div class="f-mono" style="font-size:2rem; font-weight:700; color:var(--text); line-height:1;">{{printf "%.0f" $spin.OptionB.Score}}</div>
      <div style="font-size:.6rem; color:var(--text-3); margin-top:.2rem; letter-spacing:.1em; text-transform:uppercase;">Score / 100</div>
    </div>

    {{if $spin.OptionB.Specialty}}
    <div style="font-size:.76rem; color:var(--text-3); margin-bottom:.55rem;">
      Best at: <span style="color:var(--text-2); font-weight:600;">{{$spin.OptionB.Specialty}}</span>
    </div>
    {{end}}

    <p style="font-size:.8rem; color:var(--text-3); line-height:1.6; margin-bottom:auto;">{{$spin.OptionB.Description}}</p>

    <!-- Pick footer -->
    <div class="card-footer" style="margin-left:-1.5rem; margin-right:-1.5rem; margin-bottom:-1.5rem;">
      Pick B &nbsp;→
    </div>
  </button>

</div>
{{end}}
