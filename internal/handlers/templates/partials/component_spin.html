{{define "component_spin.html"}}
{{$s := .Session}}
{{$spin := .Spin}}

<!-- Category reveal -->
<div class="anim-slot" style="margin-bottom:1.6rem; text-align:center; padding:1.3rem; background:var(--surf); border:1px solid var(--border); border-radius:2px; position:relative; overflow:hidden;">
  <div style="position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--blue) 0%, transparent 100%);"></div>
  <div style="display:flex; align-items:center; justify-content:center; gap:.75rem; flex-wrap:wrap;">
    <span style="font-size:.72rem; color:var(--text-3);">{{$spin.Era.Name}}</span>
    <span style="width:1px; height:12px; background:var(--border-2); display:inline-block;"></span>
    <span class="f-display" style="font-weight:800; font-size:.8rem; text-transform:uppercase; letter-spacing:.1em;
          background:rgba(59,130,246,.15); color:var(--blue); border-radius:2px; padding:.2rem .55rem;">
      {{categoryName $spin.Category}}
    </span>
  </div>
  <p style="font-size:.78rem; color:var(--text-3); margin-top:.5rem;">Choose the best option for your team</p>
</div>

<!-- Component pick cards -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1rem;">

  <!-- Option A -->
  <button
    hx-post="/game/{{$s.ID}}/pick/component/a"
    hx-target="#spin-area"
    hx-swap="innerHTML"
    class="comp-card anim-slide-left"
    style="padding:1.4rem; text-align:left; background:none; border:none; cursor:pointer;">
    <div class="f-display" style="font-weight:800; font-size:1rem; color:var(--text); line-height:1.3; margin-bottom:.9rem; letter-spacing:.01em;">{{$spin.OptionA.Name}}</div>

    <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.8rem; text-align:center; margin-bottom:.8rem;">
      <div class="f-mono" style="font-size:1.6rem; font-weight:700; color:var(--text);">{{printf "%.0f" $spin.OptionA.Score}}</div>
      <div style="font-size:.62rem; color:var(--text-3); margin-top:.15rem;">Score / 100</div>
    </div>

    {{if $spin.OptionA.Specialty}}
    <div style="font-size:.75rem; color:var(--text-3); margin-bottom:.6rem;">
      Best at: <span style="color:var(--text-2); font-weight:600;">{{$spin.OptionA.Specialty}}</span>
    </div>
    {{end}}

    <p style="font-size:.78rem; color:var(--text-3); line-height:1.55;">{{$spin.OptionA.Description}}</p>
  </button>

  <!-- Option B -->
  <button
    hx-post="/game/{{$s.ID}}/pick/component/b"
    hx-target="#spin-area"
    hx-swap="innerHTML"
    class="comp-card anim-slide-right"
    style="padding:1.4rem; text-align:left; background:none; border:none; cursor:pointer;">
    <div class="f-display" style="font-weight:800; font-size:1rem; color:var(--text); line-height:1.3; margin-bottom:.9rem; letter-spacing:.01em;">{{$spin.OptionB.Name}}</div>

    <div style="background:var(--surf); border:1px solid var(--border); border-radius:2px; padding:.8rem; text-align:center; margin-bottom:.8rem;">
      <div class="f-mono" style="font-size:1.6rem; font-weight:700; color:var(--text);">{{printf "%.0f" $spin.OptionB.Score}}</div>
      <div style="font-size:.62rem; color:var(--text-3); margin-top:.15rem;">Score / 100</div>
    </div>

    {{if $spin.OptionB.Specialty}}
    <div style="font-size:.75rem; color:var(--text-3); margin-bottom:.6rem;">
      Best at: <span style="color:var(--text-2); font-weight:600;">{{$spin.OptionB.Specialty}}</span>
    </div>
    {{end}}

    <p style="font-size:.78rem; color:var(--text-3); line-height:1.55;">{{$spin.OptionB.Description}}</p>
  </button>

</div>
{{end}}
