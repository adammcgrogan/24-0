{{template "base" .}}

{{define "content"}}
<div class="max-w-2xl mx-auto">
  <h2 class="text-3xl font-black mb-8">Leaderboard</h2>

  <!-- AdSense slot -->
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->

  {{if .Entries}}
  <div class="space-y-2">
    {{range .Entries}}
    <a href="/result/{{.SessionID}}"
       class="flex items-center gap-4 bg-neutral-900 hover:bg-neutral-800 rounded-lg px-5 py-4 transition-colors">
      <span class="text-2xl font-black w-10 text-center {{if eq .Rank 1}}text-yellow-400{{else if eq .Rank 2}}text-neutral-300{{else if eq .Rank 3}}text-amber-600{{else}}text-neutral-600{{end}}">
        {{.Rank}}
      </span>
      <div class="flex-1">
        <div class="font-bold">{{.Name}}</div>
        <div class="text-sm text-neutral-400">{{.Tier}}</div>
      </div>
      <div class="text-right">
        <div class="text-xl font-black">{{.Wins}}<span class="text-red-500 text-sm">-</span>{{sub 24 .Wins}}</div>
      </div>
    </a>
    {{end}}
  </div>
  {{else}}
  <div class="text-center py-16 text-neutral-600">
    <p class="text-4xl mb-4">🏎️</p>
    <p>No entries yet. Be the first!</p>
    <a href="/" class="mt-4 inline-block text-red-500 hover:text-red-400">Start drafting →</a>
  </div>
  {{end}}
</div>
{{end}}
