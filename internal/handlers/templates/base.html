{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24-0.win — Build the Perfect F1 Team</title>
  <meta name="description" content="Spin a random F1 constructor and season, draft one driver at a time, and simulate the perfect 24-race season. Can your team go 24-0?" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/htmx.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Space+Mono:wght@400;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:       #e10600;
      --red-dim:   rgba(225,6,0,0.12);
      --red-glow:  rgba(225,6,0,0.35);
      --bg:        #080808;
      --surf:      #101010;
      --surf-2:    #151515;
      --surf-3:    #1c1c1c;
      --border:    #1e1e1e;
      --border-2:  #2a2a2a;
      --border-3:  #363636;
      --text:      #efefef;
      --text-2:    #888;
      --text-3:    #484848;
      --blue:      #3b82f6;
      --blue-dim:  rgba(59,130,246,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Typography ───────────────────────────── */
    .f-display { font-family: 'Barlow Condensed', sans-serif; }
    .f-mono    { font-family: 'Space Mono', monospace; }

    /* ── Carbon fibre tile ────────────────────── */
    .carbon {
      background-image:
        repeating-linear-gradient(45deg,  rgba(255,255,255,.018) 0, rgba(255,255,255,.018) 1px, transparent 0, transparent 50%),
        repeating-linear-gradient(-45deg, rgba(255,255,255,.018) 0, rgba(255,255,255,.018) 1px, transparent 0, transparent 50%);
      background-size: 8px 8px;
    }

    /* ── Track grid ───────────────────────────── */
    .track-grid {
      background-image:
        linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    /* ── Checkered accent strip ───────────────── */
    .checkered-strip {
      background-image: repeating-conic-gradient(var(--surf-3) 0% 25%, transparent 0% 50%);
      background-size: 8px 8px;
      height: 8px;
    }

    /* ── Tier colours (preserve exact game logic) */
    .tier-perfect      { color: #f59e0b; text-shadow: 0 0 40px rgba(245,158,11,.55); }
    .tier-near-perfect { color: #a78bfa; text-shadow: 0 0 30px rgba(167,139,250,.45); }
    .tier-dominant     { color: #34d399; text-shadow: 0 0 30px rgba(52,211,153,.4);  }
    .tier-contender    { color: #60a5fa; text-shadow: 0 0 24px rgba(96,165,250,.4);  }
    .tier-winner       { color: #94a3b8; }
    .tier-points       { color: #6b7280; }
    .tier-backmarker   { color: #4b5563; }

    /* ── Animations ───────────────────────────── */
    @keyframes pageEnter {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes launchPulse {
      0%,100% { box-shadow: 0 0 0 0 var(--red-glow); }
      55%     { box-shadow: 0 0 0 18px rgba(225,6,0,0); }
    }
    @keyframes spinWheel { to { transform: rotate(360deg); } }
    @keyframes slotReveal {
      0%   { transform: translateY(-28px); opacity:0; filter: blur(6px); }
      55%  { transform: translateY(6px);   opacity:1; filter: blur(0); }
      78%  { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }
    @keyframes slideLeft {
      from { transform: translateX(-20px); opacity:0; }
      to   { transform: translateX(0);     opacity:1; }
    }
    @keyframes slideRight {
      from { transform: translateX(20px);  opacity:0; }
      to   { transform: translateX(0);     opacity:1; }
    }
    @keyframes slideUp {
      from { transform: translateY(12px);  opacity:0; }
      to   { transform: translateY(0);     opacity:1; }
    }
    @keyframes cellPop {
      from { opacity:0; transform:scale(.72); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes revDots {
      0%,100% { opacity:.35; letter-spacing:.05em; }
      50%     { opacity:1;   letter-spacing:.22em; }
    }
    @keyframes redBarGrow {
      from { width:0; }
      to   { width:100%; }
    }
    @keyframes borderPulse {
      0%,100% { border-color: var(--border-2); }
      50%     { border-color: rgba(225,6,0,.6); }
    }

    /* ── Page wrapper ─────────────────────────── */
    .page-content { animation: pageEnter .42s cubic-bezier(.16,1,.3,1) both; }

    /* ── Red top stripe ───────────────────────── */
    .top-stripe {
      height: 3px;
      background: var(--red);
      position: relative;
    }
    .top-stripe::after {
      content:'';
      display:block;
      height:1px;
      background: rgba(225,6,0,.18);
      margin-top:3px;
    }

    /* ── Sticky nav ───────────────────────────── */
    .site-nav {
      background: rgba(8,8,8,.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      position: sticky; top:0; z-index:50;
    }

    /* ── Angled launch button ─────────────────── */
    .btn-launch {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #fff;
      background: var(--red);
      border: none;
      cursor: pointer;
      padding: .9rem 3rem;
      clip-path: polygon(14px 0%, 100% 0%, calc(100% - 14px) 100%, 0% 100%);
      transition: background .18s, transform .15s, box-shadow .18s;
      animation: launchPulse 2.8s ease-in-out infinite;
      display: inline-block;
      text-decoration: none;
    }
    .btn-launch:hover {
      background: #ff1800;
      transform: scale(1.05);
      animation: none;
      box-shadow: 0 0 50px rgba(225,6,0,.55), 0 4px 20px rgba(225,6,0,.3);
    }
    .btn-launch:active { transform: scale(.97); }

    /* ── Secondary button ─────────────────────── */
    .btn-secondary {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-2);
      background: var(--surf-2);
      border: 1px solid var(--border-2);
      cursor: pointer;
      padding: .6rem 1.4rem;
      transition: all .18s;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--border-3);
      background: var(--surf-3);
    }

    /* ── Pick cards ───────────────────────────── */
    .pick-card {
      background: var(--surf-2);
      border: 1px solid var(--border-2);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s cubic-bezier(.16,1,.3,1), border-color .18s, box-shadow .2s;
    }
    .pick-card::before {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(135deg, rgba(225,6,0,.07) 0%, transparent 55%);
      opacity:0; transition:opacity .2s;
    }
    .pick-card:hover { transform: translateY(-4px) scale(1.015); border-color: var(--red); box-shadow: 0 10px 35px rgba(225,6,0,.22), 0 0 0 1px rgba(225,6,0,.25); }
    .pick-card:hover::before { opacity:1; }

    /* ── Component pick cards ─────────────────── */
    .comp-card {
      background: var(--surf-2);
      border: 1px solid var(--border-2);
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s cubic-bezier(.16,1,.3,1);
    }
    .comp-card:hover { border-color: var(--blue); background: var(--surf-3); transform: translateX(6px); box-shadow: -6px 0 24px var(--blue-dim); }

    /* ── Role list buttons ────────────────────── */
    .role-btn {
      background: var(--surf-2);
      border: 1px solid var(--border-2);
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
      width: 100%;
      text-align: left;
    }
    .role-btn:hover { border-color: var(--blue); background: var(--surf-3); transform: translateX(4px); box-shadow: -4px 0 16px var(--blue-dim); }

    /* ── Filled driver/component lineup slots ─── */
    .lineup-slot {
      background: var(--surf-2);
      border: 1px solid var(--border-2);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .lineup-slot.driver-slot::after {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background: var(--red);
    }
    .lineup-slot.comp-slot::after {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background: var(--blue);
    }
    .empty-slot {
      border: 1px dashed var(--border-2);
      border-radius: 2px;
      background: transparent;
    }

    /* ── Dividers ─────────────────────────────── */
    .divider-red { height:1px; background: linear-gradient(90deg, var(--red) 0%, rgba(225,6,0,.15) 60%, transparent 100%); }
    .divider     { height:1px; background: var(--border); }

    /* ── Section label ────────────────────────── */
    .section-label {
      font-family:'Space Mono',monospace;
      font-size:.62rem;
      letter-spacing:.22em;
      text-transform:uppercase;
      color: var(--text-3);
    }

    /* ── Stat box ─────────────────────────────── */
    .stat-box { background: var(--surf); border: 1px solid var(--border); border-radius:2px; }

    /* ── Race cells ───────────────────────────── */
    .race-cell { animation: cellPop .28s cubic-bezier(.16,1,.3,1) both; border-radius:2px; }

    /* ── Leaderboard rows ─────────────────────── */
    .lb-row {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius:2px;
      transition: all .18s;
      display:flex; align-items:center; gap:1rem;
      text-decoration:none; color:inherit;
    }
    .lb-row:hover { background: var(--surf-2); border-color: var(--border-3); transform: translateX(5px); }

    /* ── HTMX loading indicator ───────────────── */
    .htmx-indicator { display:none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display:flex; }

    /* ── Slot animations (applied in partials) ── */
    .anim-slot        { animation: slotReveal  .5s cubic-bezier(.34,1.56,.64,1) both; }
    .anim-slide-left  { animation: slideLeft   .38s cubic-bezier(.16,1,.3,1) .08s both; }
    .anim-slide-right { animation: slideRight  .38s cubic-bezier(.16,1,.3,1) .18s both; }
    .anim-slide-up    { animation: slideUp     .3s  cubic-bezier(.16,1,.3,1) both; }

    /* ── Stagger helpers ──────────────────────── */
    .d1{animation-delay:.06s} .d2{animation-delay:.12s} .d3{animation-delay:.18s}
    .d4{animation-delay:.24s} .d5{animation-delay:.30s} .d6{animation-delay:.36s}

    /* ── Spin wheel icon ──────────────────────── */
    .spin-anim { animation: spinWheel .55s linear infinite; }

    /* ── Rev dots ─────────────────────────────── */
    .rev-dots { animation: revDots 1.1s ease-in-out infinite; font-family:'Space Mono',monospace; font-size:.8rem; letter-spacing:.05em; color:var(--text-3); }

    /* ── Input styles ─────────────────────────── */
    input[type="text"] {
      background: var(--surf-2);
      border: 1px solid var(--border-2);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: .95rem;
      border-radius: 2px;
      padding: .6rem 1rem;
      transition: border-color .18s, box-shadow .18s;
      width: 100%;
    }
    input[type="text"]:focus { outline:none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(225,6,0,.1); }
    input[type="text"]::placeholder { color: var(--text-3); }

    /* ── Scrollbar ────────────────────────────── */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:2px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--red); }

    /* ── Progress pips ────────────────────────── */
    .pip { width:7px; height:7px; border-radius:50%; background:var(--border-2); transition:background .3s; flex-shrink:0; }
    .pip.done { background:var(--red); }
    .pip.next { background:var(--red); box-shadow:0 0 8px var(--red); animation:launchPulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="top-stripe"></div>

  <nav class="site-nav">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" style="text-decoration:none; display:flex; align-items:baseline; gap:.2rem;">
        <span class="f-display font-black text-2xl" style="letter-spacing:-.02em;">
          <span style="color:var(--text);">24</span><span style="color:var(--red);">—</span><span style="color:var(--text);">0</span>
        </span>
        <span class="f-mono" style="font-size:.62rem; color:var(--text-3); margin-left:.35rem;">.win</span>
      </a>
      <div class="flex items-center gap-7">
        <a href="/leaderboard" class="f-display font-semibold uppercase tracking-wider" style="font-size:.85rem; color:var(--text-2); text-decoration:none; transition:color .15s; letter-spacing:.1em;"
           onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-2)'">Leaderboard</a>
        <a href="https://ko-fi.com/YOUR_HANDLE" target="_blank" rel="noopener"
           class="f-display font-semibold uppercase tracking-wider" style="font-size:.85rem; color:var(--text-3); text-decoration:none; transition:color .15s;"
           onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">Support ☕</a>
      </div>
    </div>
  </nav>

  <main class="page-content" style="flex:1; padding-bottom:0;">
    {{block "content" .}}{{end}}
  </main>

  <footer style="border-top:1px solid var(--border); padding:1.4rem 1.5rem; margin-top:auto;">
    <p class="f-mono text-center" style="font-size:.62rem; color:var(--text-3); line-height:1.7;">
      Open source on <a href="https://github.com/adammcgrogan/24-0" style="color:inherit; text-decoration:underline; text-underline-offset:2px; transition:color .15s;" onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">GitHub</a>.
      &nbsp;F1 data via <a href="https://jolpica.com" style="color:inherit; text-decoration:underline; text-underline-offset:2px; transition:color .15s;" onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">Jolpica</a>.
      &nbsp;Not affiliated with Formula 1 or the FIA.
    </p>
  </footer>
</body>
</html>
{{end}}
